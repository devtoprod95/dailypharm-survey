name: Auto Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 히스토리 전체를 가져와야 git push가 안전합니다.

      # --- [수정된 로직] 동적 이미지(컬렉션별) 로테이션 ---
      - name: Rotate and Prepare Images
        run: |
          # 1. public/assets/ 폴더 내에 _pending.png로 끝나는 파일이 하나라도 있는지 확인
          if ls public/assets/*_pending.png 1> /dev/null 2>&1; then
            echo "New pending images found. Preparing deployment..."
            
            # 2. _pending.png 파일들을 하나씩 돌면서 로테이션 처리
            for pending_file in public/assets/*_pending.png; do
              # 파일 경로에서 실제 파일명 추출 (예: public/assets/survey_pharm_start_0_pending.png)
              echo "Processing: $pending_file"
              
              # _pending.png를 제거하여 실 서비스용 파일명 정의 (예: public/assets/survey_pharm_start_0.png)
              real_file="${pending_file%_pending.png}.png"
              
              # 대기 중인 _pending 파일을 실 서비스용 파일명으로 변경
              mv "$pending_file" "$real_file"
              echo "Activated: $real_file"
            done
            
            # 3. 변경 사항을 다시 저장소에 커밋 및 푸시 (빌드 전 파일 정리)
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add public/assets/
            git commit -m "chore: rotate dynamic landing images [skip ci]" || echo "No changes to commit"
            git push origin main
          else
            echo "No pending images found. Skipping rotation."
          fi

      # --- 기존 배포 로직 ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true